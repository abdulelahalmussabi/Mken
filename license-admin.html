<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكن — إدارة التراخيص والاشتراكات (Mken Lite)</title>
  <style>
    :root { --bg:#0f172a; --primary:#0ea5e9; --primary-d:#0284c7; --line:#e2e8f0; --muted:#64748b; --green:#10b981; --red:#ef4444; --amber:#f59e0b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Segoe UI",Tahoma,system-ui,sans-serif; background:#f1f5f9; color:#0f172a; }
    header { background:var(--bg); color:#fff; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
    header .logo { font-size:22px; font-weight:800; }
    header .logo small { font-size:12px; color:#94a3b8; font-weight:400; display:block; }
    .wrap { max-width:1200px; margin:24px auto; padding:0 20px; }
    .panel { background:#fff; border-radius:14px; box-shadow:0 6px 24px rgba(15,23,42,.08); padding:20px; margin-bottom:20px; }
    .panel h2 { margin:0 0 16px; font-size:18px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; }
    .stat { background:#fff; border-radius:12px; padding:16px; box-shadow:0 6px 24px rgba(15,23,42,.06); border-top:4px solid var(--line); }
    .stat.green{border-top-color:var(--green)} .stat.amber{border-top-color:var(--amber)} .stat.red{border-top-color:var(--red)} .stat.blue{border-top-color:var(--primary)}
    .stat .v { font-size:24px; font-weight:800; } .stat .l { color:var(--muted); font-size:13px; margin-top:4px; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
    label { display:flex; flex-direction:column; gap:6px; font-size:13px; color:var(--muted); }
    input, select { padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; }
    input:focus, select:focus { outline:2px solid var(--primary); border-color:var(--primary); }
    .btn { border:none; border-radius:10px; padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer; background:#e2e8f0; font-family:inherit; }
    .btn.primary { background:var(--primary); color:#fff; } .btn.primary:hover{background:var(--primary-d)}
    .btn.tiny { padding:5px 10px; font-size:12px; }
    .btn.danger { background:var(--red); color:#fff; } .btn.warn{background:var(--amber);color:#fff} .btn.ok{background:var(--green);color:#fff}
    .btn.ghost { background:#f1f5f9; border:1px solid var(--line); }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:right; padding:10px 12px; border-bottom:1px solid var(--line); font-size:13px; }
    th { color:var(--muted); font-weight:600; }
    .badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    .badge.active{background:#ecfdf5;color:#065f46} .badge.suspended{background:#fffbeb;color:#92400e} .badge.revoked{background:#fef2f2;color:#991b1b}
    .key { font-family:monospace; font-weight:700; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:14px; }
    .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .gate { max-width:420px; margin:80px auto; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bg); color:#fff; padding:12px 22px; border-radius:10px; z-index:50; opacity:0; transition:.3s; }
    .toast.show{opacity:1} .toast.err{background:var(--red)}
    .hidden { display:none; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="logo">مكن — إدارة التراخيص<small>Mken Lite · Subscriptions & Licenses</small></div>
    <button class="btn ghost tiny" id="logoutBtn" onclick="LicenseAdmin.logout()" style="color:#fff;background:rgba(255,255,255,.1)">خروج</button>
  </header>

  <!-- بوابة الدخول -->
  <div class="wrap gate" id="gate">
    <div class="panel">
      <h2>الدخول للوحة الإدارة</h2>
      <p class="muted">أدخل رمز الإدارة (LICENSE_ADMIN_TOKEN).</p>
      <label>رمز الإدارة
        <input type="password" id="adminToken" placeholder="••••••••" />
      </label>
      <br/>
      <button class="btn primary" onclick="LicenseAdmin.login()">دخول</button>
    </div>
  </div>

  <!-- اللوحة -->
  <div class="wrap hidden" id="dashboard">
    <div class="grid" id="stats"></div>

    <div class="panel">
      <h2>إصدار ترخيص جديد</h2>
      <div class="form-grid">
        <label>اسم العميل <input id="f_name" placeholder="منشأة..." /></label>
        <label>الجوال <input id="f_phone" placeholder="9665..." /></label>
        <label>البريد <input id="f_email" placeholder="email@..." /></label>
        <label>السجل التجاري / العمل الحر * <input id="f_cr_number" placeholder="7051816481 أو FL-..." /></label>
        <label>الرقم الضريبي (اختياري) <input id="f_tax_number" placeholder="311234567800003" /></label>
        <label>الباقة
          <select id="f_plan"><option>Lite</option><option>Pro</option><option>Business</option></select>
        </label>
        <label>نوع الاشتراك
          <select id="f_cycle">
            <option value="annual">سنوي</option>
            <option value="perpetual">رخصة دائمة</option>
            <option value="trial">تجريبي</option>
          </select>
        </label>
        <label>المدة (أشهر) <input id="f_months" type="number" value="12" /></label>
        <label>عدد الأجهزة <input id="f_devices" type="number" value="1" min="1" /></label>
        <label>ملاحظات <input id="f_notes" placeholder="اختياري" /></label>
      </div>
      <br/>
      <button class="btn primary" onclick="LicenseAdmin.issue()">إصدار وربط بالعميل</button>
    </div>

    <div class="panel">
      <h2>التراخيص</h2>
      <div class="filters">
        <label>بحث <input id="q" placeholder="مفتاح / اسم / جوال" /></label>
        <label>الحالة
          <select id="statusFilter">
            <option value="">الكل</option>
            <option value="active">فعّال</option>
            <option value="suspended">موقوف</option>
            <option value="revoked">ملغى</option>
          </select>
        </label>
        <button class="btn ghost" onclick="LicenseAdmin.load()">تحديث</button>
      </div>
      <div id="tableWrap"><p class="muted">جارٍ التحميل…</p></div>
    </div>
  </div>

  <script src="js/license-admin.js"></script>
</body>
</html>
